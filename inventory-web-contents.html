<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inventory Web Contents</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f6f8fa;
      color: #24292f;
      padding: 16px;
      min-height: 100vh;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid #d0d7de;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #1f2328;
    }

    .badge {
      background: #ddf4ff;
      color: #0969da;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 12px;
      border: 1px solid #54aeff66;
    }

    .loading {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #656d76;
      font-size: 14px;
      padding: 32px 0;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid #d0d7de;
      border-top-color: #0969da;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error-box {
      background: #fff8c5;
      border: 1px solid #d4a72c;
      border-radius: 8px;
      padding: 16px;
      font-size: 14px;
      color: #633500;
      display: none;
    }

    .error-box strong {
      display: block;
      margin-bottom: 4px;
    }

    .empty {
      text-align: center;
      color: #656d76;
      font-size: 14px;
      padding: 48px 0;
      display: none;
    }

    .content-grid {
      display: grid;
      gap: 14px;
      display: none;
    }

    .content-card {
      background: #ffffff;
      border: 1px solid #d0d7de;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 1px 3px rgba(31,35,40,0.06);
    }

    .card-header {
      background: #f6f8fa;
      border-bottom: 1px solid #d0d7de;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .content-type {
      font-size: 12px;
      font-weight: 600;
      color: #0969da;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .content-id {
      font-size: 11px;
      color: #9ea6b4;
    }

    .card-body {
      padding: 16px;
    }

    .content-value {
      font-size: 15px;
      line-height: 1.6;
      color: #1f2328;
    }

    .card-meta {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid #f0f1f2;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px 16px;
    }

    .meta-item {
      font-size: 11px;
      color: #9ea6b4;
    }

    .meta-item span {
      color: #57606a;
      font-weight: 500;
    }

    .production-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      background: #f0f6ff;
      color: #0969da;
      border: 1px solid #cae8ff;
      border-radius: 6px;
      padding: 2px 7px;
      margin-top: 4px;
    }

    .footer {
      margin-top: 20px;
      font-size: 11px;
      color: #9ea6b4;
      text-align: right;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>Inventory Web Contents</h1>
    <span class="badge" id="count-badge"></span>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    Fetching content from Tessitura…
  </div>

  <div class="error-box" id="error-box">
    <strong>Unable to load content</strong>
    <span id="error-msg"></span>
  </div>

  <div class="empty" id="empty">No web content found for this production element.</div>

  <div class="content-grid" id="content-grid"></div>

  <div class="footer" id="footer"></div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const AUTH_KEY = params.get("auth");
    const PRODUCTION_ELEMENT_ID = params.get("key");
    // base param takes priority; fall back to referrer origin
    const BASE_URL = params.get("base")
      || (document.referrer ? new URL(document.referrer).origin : null);

    const endpoint = BASE_URL
      ? `${BASE_URL}/Tessitura/api/TXN/InventoryWebContents?productionElementIds=${encodeURIComponent(PRODUCTION_ELEMENT_ID)}`
      : null;

    function formatDate(iso) {
      if (!iso) return "—";
      return new Date(iso).toLocaleString("en-US", {
        month: "short", day: "numeric", year: "numeric",
        hour: "numeric", minute: "2-digit"
      });
    }

    function renderCards(items) {
      const grid = document.getElementById("content-grid");
      grid.innerHTML = "";

      items.forEach(item => {
        const card = document.createElement("div");
        card.className = "content-card";
        card.innerHTML = `
          <div class="card-header">
            <span class="content-type">${item.ContentType?.Description ?? "Content"}</span>
            <span class="content-id">ID #${item.Id}</span>
          </div>
          <div class="card-body">
            <div class="content-value">${item.Value ?? "<em>No value</em>"}</div>
            <div class="production-tag">
              Production Element ${item.ProductionElementId}
            </div>
            <div class="card-meta">
              <div class="meta-item">Created <span>${formatDate(item.CreatedDateTime)}</span></div>
              <div class="meta-item">By <span>${item.CreatedBy ?? "—"}</span></div>
              <div class="meta-item">Updated <span>${formatDate(item.UpdatedDateTime)}</span></div>
              <div class="meta-item">By <span>${item.UpdatedBy ?? "—"}</span></div>
            </div>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    async function load() {
      if (!AUTH_KEY || !PRODUCTION_ELEMENT_ID || !endpoint) {
        document.getElementById("loading").style.display = "none";
        document.getElementById("error-msg").textContent =
          "Missing required parameters: auth, key, and base (or a referrer) must all be present.";
        document.getElementById("error-box").style.display = "block";
        return;
      }

      try {
        const res = await fetch(endpoint, {
          headers: { "Authorization": `Basic ${AUTH_KEY}` }
        });

        document.getElementById("loading").style.display = "none";

        if (!res.ok) {
          throw new Error(`HTTP ${res.status} — ${res.statusText} (${endpoint})`);
        }

        const data = await res.json();

        if (!Array.isArray(data) || data.length === 0) {
          document.getElementById("empty").style.display = "block";
          return;
        }

        document.getElementById("count-badge").textContent =
          data.length === 1 ? "1 item" : `${data.length} items`;
        renderCards(data);
        document.getElementById("content-grid").style.display = "grid";
        document.getElementById("footer").textContent =
          `Production element ${PRODUCTION_ELEMENT_ID} · Fetched ${new Date().toLocaleTimeString()}`;

      } catch (err) {
        document.getElementById("loading").style.display = "none";
        document.getElementById("error-msg").textContent =
          `${err.message} — attempted: ${endpoint}`;
        document.getElementById("error-box").style.display = "block";
      }
    }

    load();
  </script>
</body>
</html>
